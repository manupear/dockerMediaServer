services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      UMASK: ${UMASK}
      TZ: ${TZ}
    labels:
      - swag=enable
      - swag_auth=authentik
      - docker-volume-backup.stop-during-backup=true
    networks:
      - downloadStackNetwork
      - arrStackNetwork
      - musicStackNetwork
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "100m"
    volumes:
      - ${DOCKERCONFDIR}/qbittorrent:/config
      - ${DOCKERSTORAGEDIR}:/storage
    ports:
      - 8080:8080
    restart: unless-stopped

networks:
  downloadStackNetwork:
    driver: bridge
    external: true
  musicStackNetwork:
    driver: bridge
    external: true
  arrStackNetwork:
    driver: bridge
    external: true
