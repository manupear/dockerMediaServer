x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - musicStackNetwork
    - generalStackNetwork
  labels:
    - docker-volume-backup.stop-during-backup=true
  logging:
    driver: "json-file"
    options:
      max-file: "2"
      max-size: "100m"

services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    user: ${PUID}:${PGID}
    <<: *default_conf
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_LASTFM_APIKEY: ${ND_LASTFM_APIKEY}
      ND_LASTFM_SECRET: ${ND_LASTFM_SECRET}
      ND_AGENTS: audiomuseai,lastfm,deezer
      ND_DEVARTISTINFOTIMETOLIVE: 1s
      ND_PLUGINS_ENABLED: true
      ND_PLUGINS_AUTORELOAD: true
    labels:
      - swag=enable
      # - swag_auth=authelia
      - docker-volume-backup.stop-during-backup=true
    ports:
      - "4533:4533"
    volumes:
      - ${DOCKERCONFDIR}/navidrome:/data
      - ${DOCKERSTORAGEDIR}/medialibrary/music:/music:ro

  magiclists:
    image: rickysynnot/magic-lists-for-navidrome:latest
    container_name: magiclists
    user: ${PUID}:${PGID}
    <<: *default_conf
    ports:
      - "4545:8000"
    environment:
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_USERNAME: ${ND_USER}
      NAVIDROME_PASSWORD: ${ND_PWD}
      DATABASE_PATH: /app/data/magiclists.db
      AI_PROVIDER: openrouter
      AI_API_KEY: "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"
    volumes:
      - ${DOCKERCONFDIR}/magiclists:/app/data

  # PostgreSQL database service
  postgres:
    image: postgres:15-alpine
    <<: *default_conf
    container_name: audiomuse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: "audiomusedb"
    ports:
      - "${POSTGRES_PORT:-5432}:5432" # Expose PostgreSQL port to the host
    volumes:
      - ${DOCKERCONFDIR}/audiomuse-postgres:/var/lib/postgresql/data # Persistent storage for PostgreSQL data

  # AudioMuse-AI Flask application service
  audiomuse-ai-flask:
    image: ghcr.io/neptunehub/audiomuse-ai:latest # Reflects deployment.yaml
    <<: *default_conf
    container_name: audiomuse-ai-flask-app
    ports:
      - "${FRONTEND_PORT:-8000}:8000" # Map host port 8000 to container port 8000
    environment:
      SERVICE_TYPE: "flask" # Tells the container to run the Flask app
      TZ: "${TZ:-UTC}"
      # DATABASE_URL is now constructed by config.py from the following:
      POSTGRES_USER: ${POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: "audiomusedb"
      POSTGRES_HOST: "postgres" # Service name of the postgres container
      POSTGRES_PORT: "5432" # Internal port — always 5432 inside the Docker network
      REDIS_URL: "redis://redis:6379/0" # Connects to the 'redis' service
      TEMP_DIR: "/app/temp_audio"
    volumes:
      - ${DOCKERCONFDIR}/temp-audio-flask:/app/temp_audio # Volume for temporary audio files
    depends_on:
      - postgres

  # AudioMuse-AI RQ Worker service
  audiomuse-ai-worker:
    image: ghcr.io/neptunehub/audiomuse-ai:latest # Reflects deployment.yaml
    <<: *default_conf
    container_name: audiomuse-ai-worker-instance
    environment:
      SERVICE_TYPE: "worker" # Tells the container to run the RQ worker
      TZ: "${TZ:-UTC}"
      # DATABASE_URL is now constructed by config.py from the following:
      POSTGRES_USER: ${POSTGRES_USER:-audiomuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audiomusepassword}
      POSTGRES_DB: "audiomusedb"
      POSTGRES_HOST: "postgres" # Service name of the postgres container
      POSTGRES_PORT: "5432" # Internal port — always 5432 inside the Docker network
      REDIS_URL: "redis://redis:6379/0" # Connects to the 'redis' service
      TEMP_DIR: "/app/temp_audio"
    volumes:
      - ${DOCKERCONFDIR}/temp-audio-worker:/app/temp_audio # Volume for temporary audio files
    depends_on:
      - postgres


networks:
  musicStackNetwork:
    driver: bridge
    external: true
  generalStackNetwork:
    driver: bridge
    external: true
