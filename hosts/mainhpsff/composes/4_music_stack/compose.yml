x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - musicStackNetwork
    - generalStackNetwork
  labels:
    - docker-volume-backup.stop-during-backup=true
  logging:
    driver: "json-file"
    options:
      max-file: "2"
      max-size: "100m"

services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    user: ${PUID}:${PGID}
    <<: *default_conf
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_LASTFM_APIKEY: ${ND_LASTFM_APIKEY}
      ND_LASTFM_SECRET: ${ND_LASTFM_SECRET}
      ND_AGENTS: audiomuseai,lastfm,deezer
      ND_DEVARTISTINFOTIMETOLIVE: 1s
      ND_PLUGINS_ENABLED: true
      ND_PLUGINS_AUTORELOAD: true
    labels:
      - swag=enable
      # - swag_auth=authelia
      - docker-volume-backup.stop-during-backup=true
    ports:
      - "4533:4533"
    volumes:
      - ${DOCKERCONFDIR}/navidrome:/data
      - ${DOCKERSTORAGEDIR}/medialibrary/music:/music:ro

networks:
  musicStackNetwork:
    driver: bridge
    external: true
  generalStackNetwork:
    driver: bridge
    external: true
