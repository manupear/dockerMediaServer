version: "3.8"

x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - arrStackNetwork
    - jellyStackNetwork

x-authelia-conf: &autheliaPlusBackup
  labels:
    - swag=enable
    - swag_auth=authelia
    - docker-volume-backup.stop-during-backup=true

services:
  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    <<: [*default_conf, *autheliaPlusBackup]
    ports:
      - 8096:8096
    volumes:
      - ${DOCKERCONFDIR}/jellyfin:/config
      - ${DOCKERSTORAGEDIR}/medialibrary:/data

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    <<: [*default_conf, *autheliaPlusBackup]
    ports:
      - 5055:5055
    volumes:
      - ${DOCKERCONFDIR}/jellyseerr:/app/config

networks:
  jellyStackNetwork:
    driver: bridge
    external: true
  arrStackNetwork:
    driver: bridge
    external: true
