version: "3.8"

services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
      DEFAULT_WORKSPACE: /config/workspace
    restart: unless-stopped
    networks:
      - generalStackNetwork
    labels:
      - docker-volume-backup.stop-during-backup=true
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "100m"
    volumes:
      - ${DOCKERCONFDIR}/code-server:/config
      - ${DOCKERCONFDIR}:/config/workspace/appdata
    ports:
      - 8443:8443

networks:
  generalStackNetwork:
    driver: bridge
    external: true
