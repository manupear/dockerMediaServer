version: "3.8"

services:
  shoko_server:
    shm_size: 256m
    container_name: shokoserver
    image: shokoanime/server:daily
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Rome
    ports:
      - "8111:8111"
    networks:
      - jellyStackNetwork
    volumes:
      - ${DOCKERCONFDIR}/shoko-server:/home/shoko/.shoko
      - ${DOCKERSTORAGEDIR}/medialibrary:/mnt

networks:
  jellyStackNetwork:
    driver: bridge
    external: true
