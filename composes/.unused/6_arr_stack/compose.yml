version: "3.8"

x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - arrStackNetwork

x-authelia-conf: &autheliaPlusBackup
  labels:
    - swag=enable
    - swag_auth=authentik
    - docker-volume-backup.stop-during-backup=true

x-environment: &environment
  PGID: ${PGID}
  PUID: ${PUID}
  TZ: ${TZ}

services:
  radarranime:
    container_name: radarranime
    image: lscr.io/linuxserver/radarr:latest
    environment:
      <<: *environment
    <<: [*default_conf, *autheliaPlusBackup]
    ports:
      - 7879:7878
    volumes:
      - ${DOCKERCONFDIR}/radarranime:/config
      - ${DOCKERSTORAGEDIR}:/storage

  sonarranime:
    container_name: sonarranime
    image: lscr.io/linuxserver/sonarr:develop
    environment:
      <<: *environment
    <<: [*default_conf, *autheliaPlusBackup]
    ports:
      - 8990:8989
    volumes:
      - ${DOCKERCONFDIR}/sonarranime:/config
      - ${DOCKERSTORAGEDIR}:/storage

networks:
  arrStackNetwork:
    driver: bridge
    external: true
